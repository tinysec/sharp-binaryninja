name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  VERSION_MAJOR: 0
  VERSION_MINOR: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: generate version
        id: version
        shell: bash
        run: |
          # NuGet package version is 3-part SemVer: MAJOR.MINOR.BUILD (e.g. 0.1.42).
          # The build number is the monotonically increasing workflow run number.
          BUILD_NUMBER=${{ github.run_number }}
          PACKAGE_VERSION="${{ env.VERSION_MAJOR }}.${{ env.VERSION_MINOR }}.${BUILD_NUMBER}"

          # .NET AssemblyVersion/FileVersion must be a 4-part version, so pad with a trailing 0.
          ASSEMBLY_VERSION="${PACKAGE_VERSION}.0"

          echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          echo "assembly_version=${ASSEMBLY_VERSION}" >> $GITHUB_OUTPUT
          echo "build=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

          echo "Generated package version (SemVer): ${PACKAGE_VERSION}"
          echo "  - Build number (run number): ${BUILD_NUMBER}"
          echo "  - Assembly version (4-part): ${ASSEMBLY_VERSION}"

      - name: setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          
      - name: pack
        if: runner.os == 'Linux'
        run: |
          echo "[+] Packing NuGet package version ${{ steps.version.outputs.version }}"
          dotnet pack --configuration Release -o artifacts \
            -p:PublishAot=false \
            -p:PublishDir=artifacts \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} \
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}

      - name: create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: true
          files: artifacts/**

      - name: publish to NuGet
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_TOKEN }}
        run: |
          if [[ -z "${NUGET_AUTH_TOKEN}" ]]; then
              echo "[!] NUGET_TOKEN not exists , skip."; exit 0
          fi
          
          echo "[+] Publishing NuGet packages with version ${{ steps.version.outputs.version }}"
          shopt -s globstar nullglob

          for pkg in artifacts/**/*.nupkg; do
            if [[ "$pkg" == *.snupkg ]]; then
              continue
            fi
            echo "-> dotnet nuget push $pkg"
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_AUTH_TOKEN" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
  